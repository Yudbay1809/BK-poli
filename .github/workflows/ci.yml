name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bk_poli_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bk_poli_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bk_poli_ci
      AUTH_SECRET: ci-auth-secret-change-me
      AUTH_TRUST_HOST: "true"
      SUPER_ADMIN_EMAIL: superadmin@bkpoli.local
      SUPER_ADMIN_USERNAME: superadmin
      SUPER_ADMIN_PASSWORD: ChangeMe123!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        run: pnpm db:migrate:deploy

      - name: Lint
        run: pnpm --filter web lint

      - name: Build
        run: pnpm build
